<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .text-success { color: #238636 !important; }
        .btn-success { background-color: #238636; border: none; font-weight: bold; }
        .btn-success:hover { background-color: #2ea043; }
        input, select { background-color: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <h2 class="text-success mb-4"><i class="fas fa-user-shield"></i> Del_cybercheck Audit</h2>
                    <p class="text-muted small">Application de collecte de données sécurisée - Projet INF232</p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            {% for field in form %}
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}
                            </div>
                            {% endfor %}
                        </div>
                        <button type="submit" class="btn btn-success w-100 mt-3 py-2">Valider l'Audit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
