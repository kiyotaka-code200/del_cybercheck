<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del_cybercheck Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; }
        .text-success { color: #238636 !important; }
        .btn-success { background-color: #238636; border: none; font-weight: bold; transition: 0.3s; }
        .btn-success:hover { background-color: #2ea043; transform: translateY(-2px); }
        
        /* Style pour les entrées de texte et selects */
        input.form-control, select.form-control { 
            background-color: #0d1117 !important; 
            border: 1px solid #30363d !important; 
            color: white !important; 
        }
        
        /* Style pour les labels */
        .form-label { color: #8b949e; }
        
        /* Ajustement pour les cases à cocher */
        .form-check-input { background-color: #0d1117; border-color: #30363d; }
        .form-check-input:checked { background-color: #238636; border-color: #238636; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h2 class="text-success"><i class="fas fa-user-shield"></i> Del_cybercheck Audit</h2>
                        <p class="text-muted small">Collecte de données de cybersécurité - Projet INF232</p>
                    </div>
                    <hr class="border-secondary">
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            {% for field in form %}
                                {% if field.field.widget.input_type == "checkbox" %}
                                    <div class="col-12 mb-3">
                                        <div class="form-check form-switch p-3 border border-secondary rounded" style="background: #0d1117;">
                                            {{ field }}
                                            <label class="form-check-label fw-bold ms-2" for="{{ field.id_for_label }}">
                                                {{ field.label }}
                                            </label>
                                        </div>
                                    </div>
                                {% else %}
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-bold">{{ field.label }}</label>
                                        {{ field }}
                                    </div>
                                {% endif %}
                            {% endfor %}
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success w-100 py-3 shadow">
                                <i class="fas fa-check-circle me-2"></i> Valider l'Audit
                            </button>
                        </div>
                    </form>
                </div>
                <p class="text-center mt-4 text-muted small">© 2026 Del_cybercheck - Sécurité des données</p>
            </div>
        </div>
    </div>
</body>
</html>
